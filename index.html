<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amble &mdash; Legal</title>
<style>
  :root{
    --ink:#1d1d1f; --sub:#4b4b52; --muted:#8a8a90;
    --link:#1f8f6b; --link-dark:#0f6e56;
    --line:#ece6df; --bg:#fbf8f4; --card:#ffffff;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--sub);line-height:1.6;
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}

  /* ---- branded evening-sunrise header ---- */
  .hero{position:relative;overflow:hidden;text-align:center;
        padding:62px 24px 92px;
        background:linear-gradient(170deg,#454f8c 0%,#6a5a93 36%,#c97e83 70%,#f4a25a 100%);}
  .hero .hills{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:92px;z-index:0;display:block;}
  .hero .sun{position:relative;z-index:2;width:58px;height:58px;border-radius:50%;margin:0 auto 16px;
        background:radial-gradient(circle at 50% 42%,#FFF6DC 0%,#FFCF5C 55%,#FF9F6B 100%);
        box-shadow:0 0 36px rgba(255,182,92,.65),0 0 78px rgba(255,150,90,.32);}
  .hero .wordmark{position:relative;z-index:2;margin:0;color:#fff;font-size:34px;font-weight:800;
        letter-spacing:.4px;text-shadow:0 2px 18px rgba(40,28,60,.35);}
  .hero .eyebrow{position:relative;z-index:2;margin-top:7px;color:rgba(255,255,255,.88);
        font-size:12px;font-weight:700;letter-spacing:2.6px;text-transform:uppercase;}

  /* ---- document body ---- */
  .doc{max-width:760px;margin:0 auto;padding:6px 22px 96px;}
  h1{font-size:26px;color:var(--ink);margin-top:34px;}
  h2{font-size:19px;color:var(--ink);margin-top:38px;}
  h3{font-size:17px;color:var(--ink);margin-top:26px;}
  p,li{font-size:15px;}
  a{color:var(--link);text-decoration:none;word-break:break-word;}
  a:hover{color:var(--link-dark);text-decoration:underline;}
  .subtitle{color:var(--muted);font-size:14px;}
  ul{list-style-type:square;}
  ol li,ul li{margin:8px 0;}
  hr{border:none;border-top:1px solid var(--line);margin:30px 0;}
  code{background:#f1ede7;padding:1px 6px;border-radius:4px;font-size:.9em;}
  /* gentle card around the italic "In Short" lead lines */
  .doc p:has(> em > strong){background:#fff7ea;border-left:3px solid #FFCF5C;
        border-radius:9px;padding:11px 15px;margin:14px 0;color:#5a5147;}
  /* index landing cards */
  .cards{display:flex;flex-direction:column;gap:14px;max-width:460px;margin:30px auto 0;}
  .card{display:block;background:var(--card);border:1px solid var(--line);border-radius:14px;
        padding:20px 22px;font-size:18px;font-weight:700;color:var(--ink);
        box-shadow:0 6px 20px rgba(70,55,40,.06);transition:transform .12s ease,box-shadow .12s ease;}
  .card:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(70,55,40,.13);
        text-decoration:none;color:var(--link-dark);}
</style>
</head>
<body>
<header class="hero">
  <svg class="hills" viewBox="0 0 1440 120" preserveAspectRatio="none" aria-hidden="true">
    <path d="M0,78 C240,28 480,108 720,88 C960,68 1200,18 1440,68 L1440,120 L0,120 Z" fill="#4a6b59"/>
    <path d="M0,100 C300,62 600,120 900,100 C1140,84 1280,70 1440,96 L1440,120 L0,120 Z" fill="#21402f"/>
  </svg>
  <div class="sun"></div>
  <div class="wordmark">Amble</div>
  <div class="eyebrow">Legal</div>
</header>
<main class="doc">
  <div class="cards">
    <a class="card" href="privacy.html">Privacy Policy</a>
    <a class="card" href="terms.html">Terms of Use</a>
  </div>
</main>
</body>
</html>
